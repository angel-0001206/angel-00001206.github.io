<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel Beachy Beads</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #f5efe6, #e8dccf);
    text-align: center;
}

header {
    background: white;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.container {
    padding: 20px;
}

.item {
    background: white;
    margin: 15px auto;
    padding: 15px;
    width: 280px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.item img {
    width: 100%;
    border-radius: 15px;
}

.name {
    font-weight: bold;
    margin-top: 10px;
}

.price {
    color: #666;
}

/* FORM */
form {
    margin-top: 25px;
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 280px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

input, select {
    width: 90%;
    padding: 8px;
    margin: 6px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    background: #e6e6e6;
    border: none;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
}
</style>

</head>
<body>

<header>
    <h1> Angel Beachy Beads </h1>
    <p>Where Pearls Meet the Ocean, Designed in Soft Ivory Hues.</p>
</header>

<div class="container">

<!-- ITEMS -->

<div class="item">
    <img src="wob.jpg">
    <div class="name">White Ocean Bracelet</div>
    <div class="price">₱80</div>
</div>

<div class="item">
    <img src="pwb.jpg">
    <div class="name">Pearl Wave Bracelet</div>
    <div class="price">₱90</div>
</div>

<div class="item">
    <img src="spb.jpg">
    <div class="name">Sea Pearl Bracelet</div>
    <div class="price">₱70</div>
</div>

<div class="item">
    <img src="wsb.jpg">
    <div class="name">White Shell Bracelet</div>
    <div class="price">₱60</div>
</div>

<div class="item">
    <img src="s0ft pearl b.jpg">
    <div class="name">Soft Pearl Bracelet</div>
    <div class="price">₱60</div>
</div>

<!-- ORDER FORM -->
<form onsubmit="orderNow(event)">
    <h3>🛍 Order Here</h3>

    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="text" id="contact" placeholder="Contact Number" required>

    <select id="item" required>
        <option value="" disabled selected>Select item</option>
        <option>White Ocean Bracelet</option>
        <option>Pearl Wave Bracelet</option>
        <option>Sea Pearl Bracelet</option>
        <option>White Shell Bracelet</option>
        <option>Soft Pearl Bracelet</option>
    </select>

    <input type="number" id="qty" placeholder="Quantity" required>

    <button type="submit">Confirm Order</button>
</form>

</div>

<script>
function orderNow(event) {
    event.preventDefault();

    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let contact = document.getElementById("contact").value;
    let item = document.getElementById("item").value;
    let qty = document.getElementById("qty").value;

    if (item === "") {
        alert("Please select an item first");
        return;
    }

    let total = qty * 60;

    alert(
        " ORDER CONFIRMED \n\n" +
        "Name: " + name +
        "\nAddress: " + address +
        "\nContact: " + contact +
        "\nItem: " + item +
        "\nQuantity: " + qty +
        "\nTotal: ₱" + total
    );
}
</script>

</body>
</html>
